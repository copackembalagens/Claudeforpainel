      font-size:14px;font-weight:600;cursor:pointer;">Entrar</button>

<script>
(function() {
  var HASH = "2d6eda5d0d66665414e82bd553e97a92f852758711c1d98f838b25cb35f2b5be";
  var STORAGE_KEY = "painel_gate_painel_geovana";
  async function sha256(text) {
    var enc = new TextEncoder().encode(text);
    var buf = await crypto.subtle.digest("SHA-256", enc);
    return Array.from(new Uint8Array(buf)).map(function(b) {
      return b.toString(16).padStart(2, "0");
    }).join("");
  }
  function unlock() {
    var gate = document.getElementById("pw-gate");
    if (gate) gate.style.display = "none";
    document.documentElement.style.overflow = "";
  }
  function showError() {
    document.getElementById("pw-gate-error").style.display = "block";
  }
  async function tryUnlock(pwd) {
    var h = await sha256(pwd);
    if (h === HASH) {
      try { sessionStorage.setItem(STORAGE_KEY, HASH); } catch (e) {}
      unlock();
    } else {
      showError();
    }
  }
  document.addEventListener("DOMContentLoaded", function() {
    var already = null;
    try { already = sessionStorage.getItem(STORAGE_KEY); } catch (e) {}
    if (already === HASH) {
      unlock();
      return;
    }
    document.documentElement.style.overflow = "hidden";
    var input = document.getElementById("pw-gate-input");
    var btn = document.getElementById("pw-gate-btn");
    btn.addEventListener("click", function() { tryUnlock(input.value); });
    input.addEventListener("keydown", function(e) {
      if (e.key === "Enter") tryUnlock(input.value);
    });
    input.focus();
  });
})();
</script>

<script>
try{

const DATA = JSON.parse(document.getElementById('data').textContent);
function brl(v){ return 'R$ ' + (v||0).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2}); }
const MES_NOMES = {1:'Janeiro',2:'Fevereiro',3:'Março',4:'Abril',5:'Maio',6:'Junho',7:'Julho',8:'Agosto',9:'Setembro',10:'Outubro',11:'Novembro',12:'Dezembro'};
const IS_BACKOFFICE = DATA.cargo === 'PÓS-VENDAS / BACKOFFICE';

if(DATA.logo_base64){ document.getElementById('logoImg').src = DATA.logo_base64; } else { document.getElementById('logoImg').style.display='none'; }

document.getElementById('nomeCargo').textContent = DATA.nome + ' · ' + DATA.cargo;

const anos = [...new Set(DATA.periodos.map(function(p){ return p.ano; }))].sort();
const meses = [...new Set(DATA.periodos.map(function(p){ return p.mes; }))].sort(function(a,b){ return a-b; });

const state = { pending: {ano:new Set(anos), mes:new Set(meses)}, applied: {ano:new Set(anos), mes:new Set(meses)} };

function buildPanel(key, options, labelFn){
  const panel = document.querySelector('.msel-panel[data-panel="'+key+'"]');
  const toolbar = '<div class="msel-toolbar"><a data-act="all">Marcar todos</a><a data-act="none">Desmarcar todos</a></div>';
  panel.innerHTML = toolbar + options.map(function(o){
    return '<label><input type="checkbox" data-key="'+key+'" value="'+o+'" checked> '+labelFn(o)+'</label>';
  }).join('');
  panel.querySelectorAll('input').forEach(function(inp){
    inp.addEventListener('change', function(e){
      const v = parseInt(e.target.value,10);
      if(e.target.checked) state.pending[key].add(v); else state.pending[key].delete(v);
      updateCounts();
    });
  });
  panel.querySelectorAll('.msel-toolbar a').forEach(function(a){
    a.addEventListener('click', function(e){
      e.stopPropagation();
      const checked = a.dataset.act === 'all';
      panel.querySelectorAll('input').forEach(function(inp){ inp.checked = checked; });
      if(checked){ state.pending[key] = new Set(options); } else { state.pending[key].clear(); }
      updateCounts();
    });
  });
}
buildPanel('ano', anos, function(a){ return a; });
buildPanel('mes', meses, function(m){ return MES_NOMES[m]||m; });

function updateCounts(){
  document.querySelector('.n[data-n="ano"]').textContent = state.pending.ano.size;
  document.querySelector('.n[data-n="mes"]').textContent = state.pending.mes.size;
}
updateCounts();

document.querySelectorAll('.msel-btn').forEach(function(btn){
  btn.addEventListener('click', function(e){
    const panel = btn.parentElement.querySelector('.msel-panel');
    const wasOpen = panel.classList.contains('open');
    document.querySelectorAll('.msel-panel').forEach(function(p){ p.classList.remove('open'); });
    if(!wasOpen) panel.classList.add('open');
    e.stopPropagation();
  });
});
document.addEventListener('click', function(){
  document.querySelectorAll('.msel-panel').forEach(function(p){ p.classList.remove('open'); });
});
document.querySelectorAll('.msel-panel').forEach(function(p){
  p.addEventListener('click', function(e){ e.stopPropagation(); });
});

document.getElementById('btnAplicar').addEventListener('click', function(){
  state.applied = {ano:new Set(state.pending.ano), mes:new Set(state.pending.mes)};
  render();
  renderKommo();
});

function evolucaoBlock(){
  const selAnos = state.applied.ano, selMeses = state.applied.mes;
  const evo = (DATA.evolucao||[]).filter(function(e){ return selAnos.has(e.ano) && selMeses.has(e.mes); });
  if(!evo.length) return '';
  const maxTotal = Math.max.apply(null, evo.map(function(e){ return e.total; }).concat([1]));
  const rows = evo.map(function(e){
    const pctN = e.total>0 ? (e.novos/e.total*100) : 0;
    const pctR = 100-pctN;
    const tagH = (e.historico?' <span class="tag-hist">(histórico)</span>':'') + (e.parcial?' <span class="tag-parcial">(parcial)</span>':'');
    return '<div class="evorow"><div class="lbl">'+(MES_NOMES[e.mes]||e.mes)+'/'+e.ano+tagH+'</div>'+
      '<div class="evotrack"><div class="evonovos" style="width:'+(e.novos/maxTotal*100).toFixed(1)+'%"></div>'+
      '<div class="evorec" style="width:'+(e.rec/maxTotal*100).toFixed(1)+'%"></div></div>'+
      '<div class="val">'+brl(e.total)+'</div></div>';
  }).join('');

  const totalGeral = evo.reduce(function(a,e){ return a+e.total; },0);
  const totalNovos = evo.reduce(function(a,e){ return a+e.novos; },0);
  const totalRec = evo.reduce(function(a,e){ return a+e.rec; },0);
  const media = totalGeral/evo.length;
  let best = evo[0], worst = evo[0];
  evo.forEach(function(e){ if(e.total>best.total) best=e; if(e.total<worst.total) worst=e; });
  const insights = [];
  insights.push('Faturamento total no período selecionado: '+brl(totalGeral)+' ('+brl(media)+'/mês em média, '+evo.length+' meses).');
  insights.push('Mix clientes novos vs recorrentes: '+(totalGeral>0?(totalNovos/totalGeral*100).toFixed(0):'0')+'% novos e '+(totalGeral>0?(totalRec/totalGeral*100).toFixed(0):'0')+'% recorrentes.');
  insights.push('Melhor mês: '+(MES_NOMES[best.mes]||best.mes)+'/'+best.ano+' ('+brl(best.total)+'). Mês mais fraco: '+(MES_NOMES[worst.mes]||worst.mes)+'/'+worst.ano+' ('+brl(worst.total)+').');
  if(evo.length>=2){
    const last = evo[evo.length-1], prev = evo[evo.length-2];
    if(prev.total>0){
      const varPct = (last.total-prev.total)/prev.total*100;
      insights.push('Variação do último mês vs anterior ('+(MES_NOMES[prev.mes]||prev.mes)+'/'+prev.ano+' → '+(MES_NOMES[last.mes]||last.mes)+'/'+last.ano+'): '+(varPct>=0?'crescimento de +':'queda de ')+Math.abs(varPct).toFixed(1)+'%.');
    }
    let streak=1, dir=null;
    for(let i=evo.length-1;i>0;i--){
      const d = evo[i].total - evo[i-1].total;
      const cur = d>0?'up':(d<0?'down':'flat');
      if(dir===null){ dir=cur; if(cur==='flat') break; continue; }
      if(cur===dir) streak++; else break;
    }
    if(dir==='up' && streak>=2) insights.push(streak+' meses seguidos de crescimento no faturamento total.');
    if(dir==='down' && streak>=2) insights.push(streak+' meses seguidos de queda no faturamento total — vale investigar.');
  }

  return '<div class="card"><h2>Evolução de Faturamento (Clientes Novos x Recorrentes)</h2>'+
    '<div class="legend" style="margin-bottom:12px;"><span><span class="sw" style="background:var(--accent)"></span>Clientes novos</span>'+
    '<span><span class="sw" style="background:#6ea8fe"></span>Recorrentes</span></div>'+
    rows+
    '<div class="insight"><b>Análise rápida</b>'+insights.map(function(s){ return '<div class="item">• '+s+'</div>'; }).join('')+'</div>'+
    '</div>';
}

function renderKommo(){
  const el = document.getElementById('kommoContent');
  if(!DATA.kommo){ el.innerHTML=''; return; }
  const selAnos = state.applied.ano, selMeses = state.applied.mes;
  const K = DATA.kommo;

  // meses realmente presentes no ano/mes filtrado E existentes no evolucao (para nao contar meses fora do calendario real)
  const evoFiltrado = (DATA.evolucao||[]).filter(function(e){ return selAnos.has(e.ano) && selMeses.has(e.mes); });
  const nMesesReais = Math.max(evoFiltrado.length, 1);
  const metaTotal = K.meta_mensal * nMesesReais;
  const metaNovo = metaTotal * K.pct_meta_novo;
  const metaRec = metaTotal * K.pct_meta_recorrente;

  const realizadoTotal = evoFiltrado.reduce(function(a,e){ return a+e.total; },0);
  const realizadoNovo = evoFiltrado.reduce(function(a,e){ return a+e.novos; },0);
  const realizadoRec = evoFiltrado.reduce(function(a,e){ return a+e.rec; },0);

  function goalBar(label, real, meta){
    const pct = meta>0 ? (real/meta*100) : 0;
    const cls = pct>=100 ? 'goalfill over' : 'goalfill';
    return '<div class="goalwrap"><div class="goalhead"><span>'+label+'</span><b>'+brl(real)+' / '+brl(meta)+'</b></div>'+
      '<div class="goaltrack"><div class="'+cls+'" style="width:'+Math.min(pct,100).toFixed(1)+'%"></div>'+
      '<span class="goalpct">'+pct.toFixed(0)+'%</span></div></div>';
  }

  // Funil Kommo: tudo derivado de DATA.kommo.dados.por_mes, filtrado pelo mesmo período aplicado
  const mesesRows = (K.dados.por_mes||[]).filter(function(m){ return selAnos.has(m.ano) && selMeses.has(m.mes); });
  const ganhosQtd = mesesRows.reduce(function(a,m){ return a+m.ganhos_qtd; },0);
  const perdidosQtd = mesesRows.reduce(function(a,m){ return a+m.perdidos_qtd; },0);
  const valorKommo = mesesRows.reduce(function(a,m){ return a+m.valor_ganhos_kommo; },0);
  const abertoQtd = mesesRows.reduce(function(a,m){ return a+m.em_aberto_criados_qtd; },0);
  const valorPipelinePeriodo = mesesRows.reduce(function(a,m){ return a+m.valor_pipeline_criado; },0);
  const totalFechados = ganhosQtd + perdidosQtd;
  const taxaConversaoPeriodo = totalFechados>0 ? (ganhosQtd/totalFechados*100) : 0;
  const ticketMedioPeriodo = ganhosQtd>0 ? (valorKommo/ganhosQtd) : 0;

  // motivos de perda agregados no período selecionado
  const motivosMap = {};
  mesesRows.forEach(function(m){
    (m.top_motivos_perda||[]).forEach(function(mo){
      motivosMap[mo.motivo] = (motivosMap[mo.motivo]||0) + mo.qtd;
    });
  });
  const motivos = Object.entries(motivosMap).map(function(e){ return {motivo:e[0], qtd:e[1]}; }).sort(function(a,b){ return b.qtd-a.qtd; }).slice(0,5);
  const totalMotivos = Object.values(motivosMap).reduce(function(a,q){ return a+q; },0) || 1;
  const motivosHtml = motivos.length ? motivos.map(function(m){
    return '<div class="motivo-item"><span>'+m.motivo+'</span><span>'+m.qtd.toLocaleString('pt-BR')+' ('+(m.qtd/totalMotivos*100).toFixed(0)+'%)</span></div>';
  }).join('') : '<p class="empty" style="padding:6px 0;text-align:left;">Sem leads perdidos no período selecionado.</p>';

  // insights de melhoria (tudo baseado no período filtrado)
  const insights = [];
  const pctNovoReal = realizadoTotal>0 ? (realizadoNovo/realizadoTotal*100) : 0;
  if(realizadoTotal < metaTotal){
    insights.push('Faltam <b>'+brl(metaTotal-realizadoTotal)+'</b> para bater a meta do período selecionado ('+brl(metaTotal)+').');
  } else {
    insights.push('Meta do período batida! Realizado '+brl(realizadoTotal)+' contra meta de '+brl(metaTotal)+' (+'+brl(realizadoTotal-metaTotal)+').');
  }
  if(pctNovoReal < (K.pct_meta_novo*100-5)){
    insights.push('Mix no período: '+pctNovoReal.toFixed(0)+'% de clientes novos (meta é 25%) — está muito dependente de recorrentes. Vale focar prospecção de novos clientes.');
  } else if(pctNovoReal > (K.pct_meta_novo*100+10)){
    insights.push('Mix no período: '+pctNovoReal.toFixed(0)+'% de clientes novos (meta é 25%) — ótimo ritmo de aquisição, mantenha o acompanhamento dos recorrentes para não perder base.');
  }
  if(valorPipelinePeriodo > 0){
    insights.push('Você gerou <b>'+brl(valorPipelinePeriodo)+'</b> em propostas no período que ainda seguem em aberto — um follow-up nesses leads pode destravar parte da meta.');
  }
  if(motivos.length){
    const top = motivos[0];
    let dica = 'reforce o acompanhamento desses leads.';
    if(/não responde/i.test(top.motivo)) dica = 'tente reduzir o tempo de resposta e criar uma cadência de follow-up mais curta.';
    else if(/não tem interesse/i.test(top.motivo)) dica = 'revise a qualificação inicial do lead para focar energia em quem tem real potencial de compra.';
    else if(/preço/i.test(top.motivo)) dica = 'avalie condições comerciais/parcelamento para contornar a objeção de preço.';
    else if(/prazo/i.test(top.motivo)) dica = 'alinhe expectativa de prazo de produção logo no início da conversa.';
    insights.push('Principal motivo de perda no período: <b>'+top.motivo+'</b> ('+top.qtd.toLocaleString('pt-BR')+' leads) — '+dica);
  }
  if(totalFechados>0 && taxaConversaoPeriodo < 6){
    insights.push('Taxa de conversão no período: '+taxaConversaoPeriodo.toFixed(1)+'% — abaixo de 6%, vale revisar abordagem inicial e qualificação de leads.');
  }

  el.innerHTML =
    '<div class="kpis">'+
      '<div class="kpi total"><div class="lbl">Realizado no período (Omie)</div><div class="val">'+brl(realizadoTotal)+'</div></div>'+
      '<div class="kpi"><div class="lbl">Meta do período (R$'+(K.meta_mensal/1000).toFixed(0)+'k/mês)</div><div class="val">'+brl(metaTotal)+'</div></div>'+
      '<div class="kpi"><div class="lbl">Leads ganhos no período (Kommo)</div><div class="val">'+ganhosQtd+'</div></div>'+
      '<div class="kpi"><div class="lbl">Pipeline gerado no período (ainda aberto)</div><div class="val">'+brl(valorPipelinePeriodo)+'</div></div>'+
    '</div>'+
    '<div class="card"><h2>Meta de faturamento (25% clientes novos / 75% recorrentes)</h2>'+
      goalBar('Total', realizadoTotal, metaTotal)+
      goalBar('Clientes novos', realizadoNovo, metaNovo)+
      goalBar('Recorrentes', realizadoRec, metaRec)+
    '</div>'+
    '<div class="card"><h2>Funil Kommo — snapshot do período selecionado</h2>'+
      '<div class="funirow"><div class="lbl">Taxa conversão</div><div></div><div class="val">'+taxaConversaoPeriodo.toFixed(1)+'%</div></div>'+
      '<div class="funirow"><div class="lbl">Ticket médio</div><div></div><div class="val">'+brl(ticketMedioPeriodo)+'</div></div>'+
      '<div class="funirow"><div class="lbl">Leads perdidos</div><div></div><div class="val">'+perdidosQtd+'</div></div>'+
      '<div class="funirow"><div class="lbl">Leads em aberto (gerados no período)</div><div></div><div class="val">'+abertoQtd+'</div></div>'+
      '<p class="empty" style="padding:6px 0;text-align:left;">Dados do funil Kommo atualizados em '+K.atualizado_em+'. Todos os números acima refletem apenas o período selecionado no filtro.</p>'+
    '</div>'+
    '<div class="card"><h2>Principais motivos de perda no período</h2>'+motivosHtml+'</div>'+
    '<div class="insight"><b>Insights para melhorar seus resultados</b>'+insights.map(function(s){ return '<div class="item">• '+s+'</div>'; }).join('')+'</div>';
}

        }).join('') : '<tr><td colspan="8" class="empty">Sem lançamentos (histórico não possui detalhamento linha a linha)</td></tr>')+'</tbody>'+
      '</table></div>'+
    '</div>'+
    '<div class="card">'+
      '<h2>Relatório — faturamento de clientes novos que formam o bônus do período corrente, já auditado ('+rowsFat.length+' notas)</h2>'+
      '<div class="scroll"><table class="sortable">'+
        '<thead><tr><th>Cliente</th><th>NF</th><th class="num">Mercadoria</th><th class="num">Frete</th><th class="num">Base do bônus</th></tr></thead>'+
        '<tbody>'+(rowsFat.length ? rowsFat.map(function(r){
          return '<tr><td>'+(r.cliente||'')+'</td><td>'+(r.nf||'')+'</td>'+
          '<td class="num">'+brl(r.merc)+'</td><td class="num">'+brl(r.frete)+'</td><td class="num">'+brl(r.base_bonus)+'</td></tr>';
        }).join('') : '<tr><td colspan="5" class="empty">Sem lançamentos (histórico não possui detalhamento linha a linha)</td></tr>')+'</tbody>'+
      '</table></div>'+
    '</div>';

  document.querySelectorAll('.sela').forEach(function(inp){
    inp.addEventListener('input', function(e){
      selaQty[e.target.dataset.key] = parseInt(e.target.value||0,10);
      render();
    });
  });
}

render();
renderKommo();

}catch(err){
  const b = document.getElementById('errorBanner');
  b.style.display='block';
  b.textContent = 'Erro ao carregar o painel: ' + (err && err.message ? err.message : err) + (err && err.stack ? ('\n'+err.stack) : '');
  console.error(err);
}
</script>

<script>
(function(){
  var MES_NOMES_REV = {'janeiro':1,'fevereiro':2,'março':3,'marco':3,'abril':4,'maio':5,'junho':6,
    'julho':7,'agosto':8,'setembro':9,'outubro':10,'novembro':11,'dezembro':12};

  function parseSortValue(raw){
    var text = (raw||'').trim();
    if(!text) return '';
    var m = text.match(/^(\d{2})\/(\d{2})\/(\d{4})/);
    if(m){ return new Date(parseInt(m[3],10), parseInt(m[2],10)-1, parseInt(m[1],10)).getTime(); }
    m = text.match(/^([A-Za-zçÇ]+)\/(\d{4})/);
    if(m){
      var mes = MES_NOMES_REV[m[1].toLowerCase()];
      if(mes){ return new Date(parseInt(m[2],10), mes-1, 1).getTime(); }
    }
    m = text.match(/^R\$\s*(-?[\d.]+,\d{2})/);
    if(m){ return parseFloat(m[1].replace(/\./g,'').replace(',','.')); }
    m = text.match(/^(-?\d+(?:[.,]\d+)?)/);
    if(m){ return parseFloat(m[1].replace(',','.')); }
    return text.toLowerCase();
  }

  document.addEventListener('click', function(e){
    var th = e.target.closest ? e.target.closest('table.sortable th') : null;
    if(!th) return;
    var table = th.closest('table');
    var tbody = table.querySelector('tbody');
    if(!tbody) return;
    var headerRow = th.parentElement;
    var ths = Array.prototype.slice.call(headerRow.children);
    var colIndex = ths.indexOf(th);
    var newDir = th.getAttribute('data-dir') === 'asc' ? 'desc' : 'asc';
    ths.forEach(function(h){
      h.removeAttribute('data-dir');
      var old = h.querySelector('.sort-arrow');
      if(old) old.remove();
    });
    th.setAttribute('data-dir', newDir);
    var arrow = document.createElement('span');
    arrow.className = 'sort-arrow';
    arrow.textContent = newDir === 'asc' ? '▲' : '▼';
    th.appendChild(arrow);

    var rows = Array.prototype.slice.call(tbody.querySelectorAll('tr'));
    rows.sort(function(r1, r2){
      var c1 = r1.children[colIndex], c2 = r2.children[colIndex];
      var v1 = parseSortValue(c1 ? c1.textContent : '');
      var v2 = parseSortValue(c2 ? c2.textContent : '');
      var cmp;
      if(typeof v1 === 'number' && typeof v2 === 'number'){ cmp = v1 - v2; }
      else { cmp = String(v1).localeCompare(String(v2), 'pt-BR'); }
      return newDir === 'asc' ? cmp : -cmp;
    });
    rows.forEach(function(r){ tbody.appendChild(r); });
  });
})();
</script>
