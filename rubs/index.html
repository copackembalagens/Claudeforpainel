<style>
  :root{
    --bg:#0f1613; --panel:#141d19; --panel2:#182521; --border:#28352f;
    --green:#3aa373; --text:#eef4f0; --muted:#9fb0a8; --accent:#e8c766;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:linear-gradient(180deg,#0d1310,#111a15 400px, var(--bg));color:var(--text);
    font-family:'Segoe UI',Arial,sans-serif;}
  .wrap{max-width:920px;margin:0 auto;padding:28px 22px 60px;}
  header{margin-bottom:20px;display:flex;align-items:center;gap:14px;}
  header img{height:44px;width:auto;display:block;}
  h1{font-size:24px;margin:0 0 6px;color:#fff;}
  .sub{color:var(--muted);font-size:14px;}
  #errorBanner{display:none;background:#3a1414;border:1px solid #6b2323;color:#ffb3ab;padding:14px 18px;border-radius:10px;
    margin-bottom:18px;font-size:13px;white-space:pre-wrap;font-family:monospace;}
  .filterbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:var(--panel);border:1px solid var(--border);
    border-radius:12px;padding:12px 14px;margin-bottom:20px;position:relative;z-index:20;}
  .flabel{font-size:12px;color:var(--muted);margin-right:2px;}
  .msel{position:relative;}
  .msel-btn{background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:9px 14px;border-radius:8px;
    font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;}
  .msel-btn:hover{border-color:var(--green);}
  .msel-btn .n{background:var(--green);color:#06120c;border-radius:999px;font-size:11px;font-weight:700;padding:1px 7px;}
  .msel-panel{display:none;position:absolute;top:calc(100% + 6px);left:0;background:#1b2822;border:1px solid var(--border);
    border-radius:10px;padding:10px;min-width:180px;max-height:300px;overflow:auto;box-shadow:0 12px 28px rgba(0,0,0,.4);z-index:30;}
  .msel-panel.open{display:block;}
  .msel-toolbar{display:flex;gap:10px;padding:2px 4px 8px;border-bottom:1px solid var(--border);margin-bottom:6px;}
  .msel-toolbar a{font-size:11.5px;color:var(--green);cursor:pointer;text-decoration:underline;}
  .msel-toolbar a:hover{color:#48b884;}
  .msel-panel label{display:flex;align-items:center;gap:8px;font-size:13px;padding:6px 4px;border-radius:6px;cursor:pointer;}
  .msel-panel label:hover{background:#22322b;}
  .msel-panel input{accent-color:var(--green);}
  .btn{border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;}
  .btn-apply{background:var(--green);color:#06160f;}
  .btn-apply:hover{background:#48b884;}
  .btn-clear{background:transparent;color:var(--muted);border:1px solid var(--border);}
  .btn-clear:hover{color:#fff;border-color:#3d4e46;}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:22px;}
  .kpi{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;}
  .kpi .lbl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
  .kpi .val{font-size:21px;font-weight:700;color:#fff;}
  .kpi.total{background:linear-gradient(135deg,#1d3d33,#152a24);border-color:#2f5344;}
  .kpi.total .val{color:var(--accent);font-size:26px;}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:18px;}
  .card h2{font-size:15px;margin:0 0 12px;color:#fff;}
  .bar{height:10px;border-radius:6px;background:#1d2925;overflow:hidden;display:flex;margin-bottom:10px;}
  .bar div{height:100%;}
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted);}
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .sw{width:9px;height:9px;border-radius:3px;display:inline-block;}
  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{text-align:left;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;
    padding:8px 10px;border-bottom:1px solid var(--border);}
  td{padding:9px 10px;border-bottom:1px solid #1d2925;color:#dfe9e4;}
  tr:hover td{background:#182521;}
  .num{text-align:right;font-variant-numeric:tabular-nums;}
  .scroll{max-height:380px;overflow:auto;}
  .tag{display:inline-block;background:#1d3d33;color:#7fd7ae;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:600;}
  .tag-hist{font-size:10.5px;color:var(--muted);font-style:italic;}
  .tag-parcial{font-size:10.5px;color:#e8c766;font-style:italic;}
  input.sela{width:70px;text-align:right;background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:6px;}
  .empty{color:var(--muted);text-align:center;padding:30px;font-size:13px;}
  .audit{background:#12241f;border:1px solid #1e4a3a;border-radius:10px;padding:14px 16px;color:#a9e6cb;font-size:13px;line-height:1.6;margin-bottom:18px;}
  .audit b{color:#fff;}
  .audit .item{margin:4px 0 4px 14px;}
  .insight{background:#1f2312;border:1px solid #4a4a1e;border-radius:10px;padding:14px 16px;color:#e6dfa9;font-size:13px;line-height:1.7;margin-top:14px;}
  .insight b{color:#fff;}
  .insight .item{margin:3px 0 3px 14px;}
  .evorow{display:grid;grid-template-columns:82px 1fr 90px;gap:10px;align-items:center;margin-bottom:8px;font-size:12.5px;}
  .evorow .lbl{color:var(--muted);}
  .evotrack{height:16px;border-radius:5px;background:#1d2925;overflow:hidden;display:flex;}
  .evotrack div{height:100%;}
  .evonovos{background:var(--accent);}
  .evorec{background:#6ea8fe;}
  .evorow .val{text-align:right;font-variant-numeric:tabular-nums;color:#dfe9e4;}
  .tabs{display:flex;gap:8px;margin-bottom:18px;}
  .tabbtn{background:var(--panel);border:1px solid var(--border);color:var(--muted);padding:10px 18px;border-radius:10px 10px 0 0;font-size:13px;font-weight:600;cursor:pointer;}
  .tabbtn.active{background:var(--panel2);color:#fff;border-bottom:2px solid var(--green);}
  .tabbtn:hover{color:#fff;}
  .goalwrap{margin-bottom:16px;}
  .goalhead{display:flex;justify-content:space-between;font-size:12.5px;color:var(--muted);margin-bottom:4px;}
  .goalhead b{color:#fff;}
  .goaltrack{height:18px;border-radius:6px;background:#1d2925;overflow:hidden;position:relative;}
  .goalfill{height:100%;background:linear-gradient(90deg,#3aa373,#48b884);}
  .goalfill.over{background:linear-gradient(90deg,#e8c766,#f0d488);}
  .goalpct{position:absolute;right:8px;top:0;font-size:11px;line-height:18px;color:#06160f;font-weight:700;}
  .funirow{display:grid;grid-template-columns:100px 1fr 90px;gap:10px;align-items:center;margin-bottom:8px;font-size:12.5px;}
  .funirow .lbl{color:var(--muted);}

  .sortable th{cursor:pointer;user-select:none;}
  .sortable th:hover{color:#fff;}
  .sort-arrow{font-size:9px;margin-left:5px;color:var(--accent);}
</style>
</head>

<div id="pw-gate" style="position:fixed;inset:0;z-index:999999;background:#0f172a;
display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;">
  <div style="background:#1e293b;padding:36px 32px;border-radius:12px;width:100%;max-width:340px;
  box-shadow:0 10px 40px rgba(0,0,0,.4);">
    <div style="font-size:18px;font-weight:600;color:#f1f5f9;margin-bottom:6px;">Painel Rubs</div>
    <div style="font-size:13px;color:#94a3b8;margin-bottom:18px;">Digite a senha para continuar</div>
    <input id="pw-gate-input" type="password" autocomplete="current-password"
      style="width:100%;box-sizing:border-box;padding:10px 12px;border-radius:8px;border:1px solid #334155;
      background:#0f172a;color:#f1f5f9;font-size:14px;outline:none;margin-bottom:10px;" />
    <button id="pw-gate-btn"
      style="width:100%;padding:10px 12px;border-radius:8px;border:none;background:#3b82f6;color:#fff;
      font-size:14px;font-weight:600;cursor:pointer;">Entrar</button>
    <div id="pw-gate-error" style="display:none;color:#f87171;font-size:12px;margin-top:10px;">
      Senha incorreta. Tente novamente.</div>
  </div>
</div>
<script>
(function() {
  var HASH = "0f01707dcab6b06606076ffcb7dc952cfacbc6ff6ca8a0e3e874b170d8fc3d12";
  var STORAGE_KEY = "painel_gate_painel_rubs";
  async function sha256(text) {
    var enc = new TextEncoder().encode(text);
    var buf = await crypto.subtle.digest("SHA-256", enc);
    return Array.from(new Uint8Array(buf)).map(function(b) {
      return b.toString(16).padStart(2, "0");
    }).join("");
  }
  function unlock() {
    var gate = document.getElementById("pw-gate");
    if (gate) gate.style.display = "none";
    document.documentElement.style.overflow = "";
  }
  function showError() {
    document.getElementById("pw-gate-error").style.display = "block";
  }
  async function tryUnlock(pwd) {
    var h = await sha256(pwd);
    if (h === HASH) {
      try { sessionStorage.setItem(STORAGE_KEY, HASH); } catch (e) {}
      unlock();
    } else {
      showError();
    }
  }
  document.addEventListener("DOMContentLoaded", function() {
    var already = null;
    try { already = sessionStorage.getItem(STORAGE_KEY); } catch (e) {}
    if (already === HASH) {
      unlock();
      return;
    }
    document.documentElement.style.overflow = "hidden";
    var input = document.getElementById("pw-gate-input");
    var btn = document.getElementById("pw-gate-btn");
    btn.addEventListener("click", function() { tryUnlock(input.value); });
    input.addEventListener("keydown", function(e) {
      if (e.key === "Enter") tryUnlock(input.value);
    });
    input.focus();
  });
})();
</script>

do": 20, "corte_dias": 2, "n_compras_2026": 3, "valor_estimado": 630.71, "comissao_estimada": 6.31, "telefone": "6182339534", "cnpj": "63.841.062/0001-46"}]}, "meta": {"competencia_atual": "Julho/2026", "data_pagamento_atual": "2026-08-10", "gerado_em": "2026-07-23", "nota_historico": "Todos os períodos de Dezembro/2025 a Junho/2026 refletem os valores já pagos, num total de 7 competências fechadas. Junho/2026 foi pago em 10/07/2026 e passou a histórico nesta atualização (15/07/2026) sem qualquer alteração de valor. Julho/2026 é o período parcial em acompanhamento (a pagar em 10/08/2026), apurado via API Omie (faturamento até 14/07/2026) — ainda sem dados de recebimento/comissão e sem cruzamento contra NF-e canceladas.", "nota_auditoria": "Auditoria de clientes novos: para cada NF marcada como \"cliente novo\", verifica-se se aquele cliente já aparece em alguma NF AUTORIZADA anterior (qualquer vendedor, qualquer tag, ano 2026, exceto Amostra/Seladora/NFs canceladas). Se sim, o faturamento é excluído da base de bônus de clientes novos e reclassificado como recorrente. Aplicada a Junho e Julho/2026. Correção adicional em 2026-07-06: 4 notas fiscais canceladas foram identificadas por comparação com o relatório oficial 'Situação: Autorizado' e removidas de todos os cálculos (faturamento, bônus e base do backoffice) de Junho/2026 — uma delas estava gerando uma exclusão indevida no bônus de clientes novos de um dos consultores; 2 notas autorizadas que faltavam na base da API foram incluídas. Varredura completa do ano em 10/07/2026: reaplicada a mesma auditoria a todo o histórico (Dezembro/2025 a Julho/2026), encontrando 28 novos casos de cliente-novo mal classificado em Janeiro-Maio/2026 (além dos 12 já conhecidos de Junho). Em 37 dos 39 casos totais não houve mudança de faixa de bônus; em Fevereiro e Maio/2026 a base consolidada de supervisão mudaria de faixa (R$1.500 pago -> R$1.000 corrigido), mas por decisão do usuário os valores já pagos foram mantidos, apenas registrados nesta auditoria. Também foram incorporadas 2 notas de serviço (módulo OS/Serviço do Omie) vinculadas a 'Joice - Clientes Recorrentes' que não constavam na base original de Maio e Junho/2026 (R$31.000 e R$52.700) — a diferença de gratificação do backoffice (R$167,40 por pessoa) será paga como crédito no ciclo de Julho/2026. Varredura retroativa por CNPJ de 17/07/2026 (Jan-Jun/2026 completo, 620 lançamentos revisados, decisão do usuário — não altera nenhum valor já pago, só documenta). CORREÇÃO IMPORTANTE (mesmo dia, após checagem adicional pedida pelo usuário): a primeira versão desta varredura não cruzava contra o relatório 'Situação: Autorizado' de cada mês — ao cruzar, 2 dos casos inicialmente listados como 'cliente novo indevidamente excluído' eram na verdade NF cancelada + reemissão (não duplicidade de cliente), o que muda a conclusão desses 2 casos; os demais achados foram confirmados. Resumo final: (1) 6 notas de 'Clientes Novos'/iSet nunca constaram na base original e, ao checar contra 'Situação: Autorizado' do mês, confirmou-se que são notas CANCELADAS (não é erro de processamento, foram corretamente deixadas de fora) — NF 00008884 Royal Towers (fev), NF 00009044 A.M.C2 Comércio de Alimentos (fev), NF 00009666 Ana Tereza de Paulo Madruga (abr), NF 00009706 Mariana do Nascimento Sousa (abr), NF 00009760 Lucas Vinicius Odorizzi (abr), NF 00010211 Prime Soluções Empresariais (jun) — nenhuma ação necessária. (2) 9 notas deveriam ter sido excluídas da base de clientes novos por já terem CNPJ repetido dentro de 2026 (a compra anterior confirmada como autorizada) e não foram: 7 no Site iSet — Guilherme Romani NF 00009391 (mar, confirmado contra a compra anterior autorizada NF 00008746/jan), Felipe Augusto de Araújo NF 00009545 (abr) e novamente NF 00010247 (jun) — ambos contra a compra anterior NF 00008856/jan —, Life Reprodução Humana NF 00010246 (jun, contra NF 00009118/fev), Portal Agrícola NF 00010347 (jun, contra NF 00008954/fev), Arthur Taboza Barros NF 00010405 (jun, contra NF 00008710/jan) — afetam só a base consolidada de supervisão, não comissão de nenhum consultor — e 2 casos de duplicidade do mesmo consultor com o mesmo cliente: FAL Alimentação e Eventos NF 00009855 (Rubs, mai, contra a compra anterior autorizada NF 00009425/mar, nome fantasia 'Buffet da Corte' no relatório manual mas mesmo CNPJ/razão social na API) e Arena Infra NF 00009956 (Eduardo, mai, contra NF 00009955, mesmo dia). (3) DOIS casos que pareciam duplicidade do mesmo consultor eram na verdade cancelamento + reemissão — a NF mais antiga estava CANCELADA (não aparece no relatório 'Situação: Autorizado' do mês), então a NF mais recente é a única venda real e deve permanecer contando como cliente novo (nenhuma correção necessária nesses 2 — RETRATANDO a conclusão inicial): 3AC Produções e Eventos — NF 00010075 (mai) está cancelada, NF 00010077 (mai, Rubs) é a venda real e válida; Instituto Leão Sampaio / Centro Universitário Unileão — NF 00010207 (jun) está cancelada, NF 00010220 (jun, Eduardo) é a venda real e válida. (4) 2 exclusões antigas (feitas por correspondência de nome, antes de 15/07) mostraram-se FALSOS POSITIVOS reais ao checar por CNPJ — deveriam ter contado como clientes novos: AGROSUL MAQUINAS LTDA (Joice, jun/2026) — as 7 notas fiscais de 03/06/2026 (NF 00010121 a 00010127, R$12.872,90 no total, todas confirmadas autorizadas) têm 7 CNPJs DIFERENTES entre si (filiais distintas de uma rede), mas foram todas excluídas por citarem a mesma razão social da NF 00008965 (fev/2026, também autorizada); e IGREJA EVANGELICA PENTECOSTAL (Rubs, NF 00009984, mai/2026, R$390,00, autorizada) — excluída por citar NF 00009715 (Joice, abr/2026, também autorizada), mas são CNPJs diferentes (02678512000137 vs 01565490000136) e organizações distintas (uma em MG, outra 'O Brasil Para Cristo' em SP). (5) Outros 7 casos citando compra em Dezembro/2025 (Pontes Lanchonete, Mariana Porto Morais, Joacir Pereira Fernandes, La Gelateria Sorvetes e Gelatos, CT <script>
try{

const DATA = JSON.parse(document.getElementById('data').textContent);
function brl(v){ return 'R$ ' + (v||0).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2}); }
const MES_NOMES = {1:'Janeiro',2:'Fevereiro',3:'Março',4:'Abril',5:'Maio',6:'Junho',7:'Julho',8:'Agosto',9:'Setembro',10:'Outubro',11:'Novembro',12:'Dezembro'};
const IS_BACKOFFICE = DATA.cargo === 'PÓS-VENDAS / BACKOFFICE';

if(DATA.logo_base64){ document.getElementById('logoImg').src = DATA.logo_base64; } else { document.getElementById('logoImg').style.display='none'; }

document.getElementById('nomeCargo').textContent = DATA.nome + ' · ' + DATA.cargo;

const anos = [...new Set(DATA.periodos.map(function(p){ return p.ano; }))].sort();
const meses = [...new Set(DATA.periodos.map(function(p){ return p.mes; }))].sort(function(a,b){ return a-b; });

const state = { pending: {ano:new Set(anos), mes:new Set(meses)}, applied: {ano:new Set(anos), mes:new Set(meses)} };

function buildPanel(key, options, labelFn){
  const panel = document.querySelector('.msel-panel[data-panel="'+key+'"]');
  const toolbar = '<div class="msel-toolbar"><a data-act="all">Marcar todos</a><a data-act="none">Desmarcar todos</a></div>';
  panel.innerHTML = toolbar + options.map(function(o){
    return '<label><input type="checkbox" data-key="'+key+'" value="'+o+'" checked> '+labelFn(o)+'</label>';
  }).join('');
  panel.querySelectorAll('input').forEach(function(inp){
    inp.addEventListener('change', function(e){
      const v = parseInt(e.target.value,10);
      if(e.target.checked) state.pending[key].add(v); else state.pending[key].delete(v);
      updateCounts();
    });
  });
  panel.querySelectorAll('.msel-toolbar a').forEach(function(a){
    a.addEventListener('click', function(e){
      e.stopPropagation();
      const checked = a.dataset.act === 'all';
      panel.querySelectorAll('input').forEach(function(inp){ inp.checked = checked; });
      if(checked){ state.pending[key] = new Set(options); } else { state.pending[key].clear(); }
      updateCounts();
    });
  });
}
buildPanel('ano', anos, function(a){ return a; });
buildPanel('mes', meses, function(m){ return MES_NOMES[m]||m; });

function updateCounts(){
  document.querySelector('.n[data-n="ano"]').textContent = state.pending.ano.size;
  document.querySelector('.n[data-n="mes"]').textContent = state.pending.mes.size;
}
updateCounts();

document.querySelectorAll('.msel-btn').forEach(function(btn){
  btn.addEventListener('click', function(e){
    const panel = btn.parentElement.querySelector('.msel-panel');
    const wasOpen = panel.classList.contains('open');
    document.querySelectorAll('.msel-panel').forEach(function(p){ p.classList.remove('open'); });
    if(!wasOpen) panel.classList.add('open');
    e.stopPropagation();
  });
});
document.addEventListener('click', function(){
  document.querySelectorAll('.msel-panel').forEach(function(p){ p.classList.remove('open'); });
});
document.querySelectorAll('.msel-panel').forEach(function(p){
  p.addEventListener('click', function(e){ e.stopPropagation(); });
});

document.getElementById('btnAplicar').addEventListener('click', function(){
  state.applied = {ano:new Set(state.pending.ano), mes:new Set(state.pending.mes)};
  render();
  renderKommo();
  renderReativacao();
});
document.getElementById('btnLimpar').addEventListener('click', function(){
  state.pending = {ano:new Set(anos), mes:new Set(meses)};
  state.applied = {ano:new Set(anos), mes:new Set(meses)};
  document.querySelectorAll('.msel-panel input').forEach(function(i){ i.checked=true; });
  updateCounts();
  render();
  renderKommo();
});

if(DATA.kommo){
  document.getElementById('tabsBar').style.display='flex';
  document.querySelectorAll('.tabbtn').forEach(function(btn){
    btn.addEventListener('click', function(){
      document.querySelectorAll('.tabbtn').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      document.getElementById('content').style.display = (tab==='comissao') ? '' : 'none';
      document.getElementById('kommoContent').style.display = (tab==='kommo') ? '' : 'none';
      document.getElementById('reativacaoContent').style.display = (tab==='reativacao') ? '' : 'none';
      document.getElementById('auditBox').style.display = (tab==='comissao' && auditBoxHasContent) ? 'block' : 'none';
      document.getElementById('auditTomadosBox').style.display = (tab==='comissao' && auditTomadosBoxHasContent) ? 'block' : 'none';
    });
  });
}

let selaQty = {};
let auditBoxHasContent = false;
let auditTomadosBoxHasContent = false;

function periodoTags(p){ return (p.historico?' <span class="tag-hist">(histórico)</span>':'') + (p.parcial?' <span class="tag-parcial">(dados parciais)</span>':''); }
function periodoLabel(p){ return (MES_NOMES[p.mes]||p.mes)+'/'+p.ano; }

function evolucaoBlock(){
  const selAnos = state.applied.ano, selMeses = state.applied.mes;
  const evo = (DATA.evolucao||[]).filter(function(e){ return selAnos.has(e.ano) && selMeses.has(e.mes); });
  if(!evo.length) return '';
  const maxTotal = Math.max.apply(null, evo.map(function(e){ return e.total; }).concat([1]));
  const rows = evo.map(function(e){
    const pctN = e.total>0 ? (e.novos/e.total*100) : 0;
    const pctR = 100-pctN;
    const tagH = (e.historico?' <span class="tag-hist">(histórico)</span>':'') + (e.parcial?' <span class="tag-parcial">(parcial)</span>':'');
    return '<div class="evorow"><div class="lbl">'+(MES_NOMES[e.mes]||e.mes)+'/'+e.ano+tagH+'</div>'+
      '<div class="evotrack"><div class="evonovos" style="width:'+(e.novos/maxTotal*100).toFixed(1)+'%"></div>'+
      '<div class="evorec" style="width:'+(e.rec/maxTotal*100).toFixed(1)+'%"></div></div>'+
      '<div class="val">'+brl(e.total)+'</div></div>';
  }).join('');

  const totalGeral = evo.reduce(function(a,e){ return a+e.total; },0);
  const totalNovos = evo.reduce(function(a,e){ return a+e.novos; },0);
  const totalRec = evo.reduce(function(a,e){ return a+e.rec; },0);
  const media = totalGeral/evo.length;
  let best = evo[0], worst = evo[0];
  evo.forEach(function(e){ if(e.total>best.total) best=e; if(e.total<worst.total) worst=e; });
  const insights = [];
  insights.push('Faturamento total no período selecionado: '+brl(totalGeral)+' ('+brl(media)+'/mês em média, '+evo.length+' meses).');
  insights.push('Mix clientes novos vs recorrentes: '+(totalGeral>0?(totalNovos/totalGeral*100).toFixed(0):'0')+'% novos e '+(totalGeral>0?(totalRec/totalGeral*100).toFixed(0):'0')+'% recorrentes.');
  insights.push('Melhor mês: '+(MES_NOMES[best.mes]||best.mes)+'/'+best.ano+' ('+brl(best.total)+'). Mês mais fraco: '+(MES_NOMES[worst.mes]||worst.mes)+'/'+worst.ano+' ('+brl(worst.total)+').');
  if(evo.length>=2){
    const last = evo[evo.length-1], prev = evo[evo.length-2];
    if(prev.total>0){
      const varPct = (last.total-prev.total)/prev.total*100;
      insights.push('Variação do último mês vs anterior ('+(MES_NOMES[prev.mes]||prev.mes)+'/'+prev.ano+' → '+(MES_NOMES[last.mes]||last.mes)+'/'+last.ano+'): '+(varPct>=0?'crescimento de +':'queda de ')+Math.abs(varPct).toFixed(1)+'%.');
    }
    let streak=1, dir=null;
    for(let i=evo.length-1;i>0;i--){
      const d = evo[i].total - evo[i-1].total;
      const cur = d>0?'up':(d<0?'down':'flat');
      if(dir===null){ dir=cur; if(cur==='flat') break; continue; }
      if(cur===dir) streak++; else break;
    }
    if(dir==='up' && streak>=2) insights.push(streak+' meses seguidos de crescimento no faturamento total.');
    if(dir==='down' && streak>=2) insights.push(streak+' meses seguidos de queda no faturamento total — vale investigar.');
  }

  return '<div class="card"><h2>Evolução de Faturamento (Clientes Novos x Recorrentes)</h2>'+
    '<div class="legend" style="margin-bottom:12px;"><span><span class="sw" style="background:var(--accent)"></span>Clientes novos</span>'+
    '<span><span class="sw" style="background:#6ea8fe"></span>Recorrentes</span></div>'+
    rows+
    '<div class="insight"><b>Análise rápida</b>'+insights.map(function(s){ return '<div class="item">• '+s+'</div>'; }).join('')+'</div>'+

function copiarTelefone(el, tel){
  const ta = document.createElement('textarea');
  ta.value = tel; document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); }catch(e){}
  document.body.removeChild(ta);
  el.classList.add('copiado');
  const original = el.textContent;
  el.textContent = 'Copiado!';
  setTimeout(function(){ el.textContent = original; el.classList.remove('copiado'); }, 1200);
}

function renderKommo(){
  const el = document.getElementById('kommoContent');
  if(!DATA.kommo){ el.innerHTML=''; return; }
  const selAnos = state.applied.ano, selMeses = state.applied.mes;
  const K = DATA.kommo;

  // meses realmente presentes no ano/mes filtrado E existentes no evolucao (para nao contar meses fora do calendario real)
  const evoFiltrado = (DATA.evolucao||[]).filter(function(e){ return selAnos.has(e.ano) && selMeses.has(e.mes); });
  const nMesesReais = Math.max(evoFiltrado.length, 1);
  const metaTotal = K.meta_mensal * nMesesReais;
  const metaNovo = metaTotal * K.pct_meta_novo;
  const metaRec = metaTotal * K.pct_meta_recorrente;

  const realizadoTotal = evoFiltrado.reduce(function(a,e){ return a+e.total; },0);
  const realizadoNovo = evoFiltrado.reduce(function(a,e){ return a+e.novos; },0);
  const realizadoRec = evoFiltrado.reduce(function(a,e){ return a+e.rec; },0);

  function goalBar(label, real, meta){
    const pct = meta>0 ? (real/meta*100) : 0;
    const cls = pct>=100 ? 'goalfill over' : 'goalfill';
    return '<div class="goalwrap"><div class="goalhead"><span>'+label+'</span><b>'+brl(real)+' / '+brl(meta)+'</b></div>'+
      '<div class="goaltrack"><div class="'+cls+'" style="width:'+Math.min(pct,100).toFixed(1)+'%"></div>'+
      '<span class="goalpct">'+pct.toFixed(0)+'%</span></div></div>';
  }

  // Funil Kommo: tudo derivado de DATA.kommo.dados.por_mes, filtrado pelo mesmo período aplicado
  const mesesRows = (K.dados.por_mes||[]).filter(function(m){ return selAnos.has(m.ano) && selMeses.has(m.mes); });
  const ganhosQtd = mesesRows.reduce(function(a,m){ return a+m.ganhos_qtd; },0);
  const perdidosQtd = mesesRows.reduce(function(a,m){ return a+m.perdidos_qtd; },0);
  const valorKommo = mesesRows.reduce(function(a,m){ return a+m.valor_ganhos_kommo; },0);
  const abertoQtd = mesesRows.reduce(function(a,m){ return a+m.em_aberto_criados_qtd; },0);
  const valorPipelinePeriodo = mesesRows.reduce(function(a,m){ return a+m.valor_pipeline_criado; },0);
  const totalFechados = ganhosQtd + perdidosQtd;
  const taxaConversaoPeriodo = totalFechados>0 ? (ganhosQtd/totalFechados*100) : 0;
  const ticketMedioPeriodo = ganhosQtd>0 ? (valorKommo/ganhosQtd) : 0;

  // motivos de perda agregados no período selecionado
  const motivosMap = {};
  mesesRows.forEach(function(m){
    (m.top_motivos_perda||[]).forEach(function(mo){
      motivosMap[mo.motivo] = (motivosMap[mo.motivo]||0) + mo.qtd;
    });
  });
  const motivos = Object.entries(motivosMap).map(function(e){ return {motivo:e[0], qtd:e[1]}; }).sort(function(a,b){ return b.qtd-a.qtd; }).slice(0,5);
  const totalMotivos = Object.values(motivosMap).reduce(function(a,q){ return a+q; },0) || 1;
  const motivosHtml = motivos.length ? motivos.map(function(m){
    return '<div class="motivo-item"><span>'+m.motivo+'</span><span>'+m.qtd.toLocaleString('pt-BR')+' ('+(m.qtd/totalMotivos*100).toFixed(0)+'%)</span></div>';
  }).join('') : '<p class="empty" style="padding:6px 0;text-align:left;">Sem leads perdidos no período selecionado.</p>';

  // insights de melhoria (tudo baseado no período filtrado)
  const insights = [];
  const pctNovoReal = realizadoTotal>0 ? (realizadoNovo/realizadoTotal*100) : 0;
  if(valorKommo < metaTotal){
    insights.push('Vendas (Kommo): faltam <b>'+brl(metaTotal-valorKommo)+'</b> para bater a meta de vendas do período ('+brl(metaTotal)+').');
  } else {
    insights.push('Vendas (Kommo): meta batida! Vendido '+brl(valorKommo)+' contra meta de '+brl(metaTotal)+' (+'+brl(valorKommo-metaTotal)+').');
  }
  const gapVendaFat = valorKommo - realizadoTotal;
  if(Math.abs(gapVendaFat) > 0.01){
    insights.push(gapVendaFat>0
      ? 'Vendido no Kommo supera o faturado no Omie em <b>'+brl(gapVendaFat)+'</b> — esperado pelo prazo de produção: parte do que você vendeu no período ainda vai virar nota fiscal nos próximos meses.'
      : 'Faturado no Omie supera o vendido no Kommo em <b>'+brl(-gapVendaFat)+'</b> no período — reflexo de vendas de meses anteriores que só agora saíram da produção e viraram nota fiscal.');
  }
  if(realizadoTotal < metaTotal){
    insights.push('Faturamento (Omie): faltam <b>'+brl(metaTotal-realizadoTotal)+'</b> para bater a meta do período selecionado ('+brl(metaTotal)+').');
  } else {
    insights.push('Faturamento (Omie): meta do período batida! Realizado '+brl(realizadoTotal)+' contra meta de '+brl(metaTotal)+' (+'+brl(realizadoTotal-metaTotal)+').');
  }
  if(pctNovoReal < (K.pct_meta_novo*100-5)){
    insights.push('Mix no período: '+pctNovoReal.toFixed(0)+'% de clientes novos (meta é 25%) — está muito dependente de recorrentes. Vale focar prospecção de novos clientes.');
  } else if(pctNovoReal > (K.pct_meta_novo*100+10)){
    insights.push('Mix no período: '+pctNovoReal.toFixed(0)+'% de clientes novos (meta é 25%) — ótimo ritmo de aquisição, mantenha o acompanhamento dos recorrentes para não perder base.');
  }
  if(valorPipelinePeriodo > 0){
    insights.push('Você gerou <b>'+brl(valorPipelinePeriodo)+'</b> em propostas no período que ainda seguem em aberto — um follow-up nesses leads pode destravar parte da meta.');
  }
  if(motivos.length){
    const top = motivos[0];
    let dica = 'reforce o acompanhamento desses leads.';
    if(/não responde/i.test(top.motivo)) dica = 'tente reduzir o tempo de resposta e criar uma cadência de follow-up mais curta.';
    else if(/não tem interesse/i.test(top.motivo)) dica = 'revise a qualificação inicial do lead para focar energia em quem tem real potencial de compra.';
    else if(/preço/i.test(top.motivo)) dica = 'avalie condições comerciais/parcelamento para contornar a objeção de preço.';
    else if(/prazo/i.test(top.motivo)) dica = 'alinhe expectativa de prazo de produção logo no início da conversa.';
    insights.push('Principal motivo de perda no período: <b>'+top.motivo+'</b> ('+top.qtd.toLocaleString('pt-BR')+' leads) — '+dica);
  }
  if(totalFechados>0 && taxaConversaoPeriodo < 6){
    insights.push('Taxa de conversão no período: '+taxaConversaoPeriodo.toFixed(1)+'% — abaixo de 6%, vale revisar abordagem inicial e qualificação de leads.');
  }

  el.innerHTML =
    '<div class="kpis">'+
      '<div class="kpi total"><div class="lbl">Vendido no período (Kommo)</div><div class="val">'+brl(valorKommo)+'</div></div>'+
      '<div class="kpi"><div class="lbl">Faturado no período (Omie)</div><div class="val">'+brl(realizadoTotal)+'</div></div>'+
      '<div class="kpi"><div class="lbl">Meta do período (R$'+(K.meta_mensal/1000).toFixed(0)+'k/mês)</div><div class="val">'+brl(metaTotal)+'</div></div>'+
      '<div class="kpi"><div class="lbl">Leads ganhos no período (Kommo)</div><div class="val">'+ganhosQtd+'</div></div>'+
    '</div>'+
    '<div class="card"><h2>Meta de Vendas — Kommo (data do fechamento do negócio)</h2>'+
      goalBar('Total vendido', valorKommo, metaTotal)+
      '<p class="empty" style="padding:6px 0;text-align:left;">Reflete o momento em que você ganhou a venda no Kommo — ritmo comercial em tempo real, antes do prazo de produção. O Kommo não distingue cliente novo/recorrente, por isso só há a barra Total aqui.</p>'+
    '</div>'+
    '<div class="card"><h2>Meta de Faturamento — Omie (25% clientes novos / 75% recorrentes)</h2>'+
      goalBar('Total', realizadoTotal, metaTotal)+
      goalBar('Clientes novos', realizadoNovo, metaNovo)+
      goalBar('Recorrentes', realizadoRec, metaRec)+
      '<p class="empty" style="padding:6px 0;text-align:left;">Reflete a nota fiscal emitida no Omie — a mesma venda do Kommo, reconhecida depois do prazo de produção.</p>'+
    '</div>'+
    '<div class="card"><h2>Funil Kommo — snapshot do período selecionado</h2>'+
      '<div class="funirow"><div class="lbl">Taxa conversão</div><div></div><div class="val">'+taxaConversaoPeriodo.toFixed(1)+'%</div></div>'+
      '<div class="funirow"><div class="lbl">Ticket médio</div><div></div><div class="val">'+brl(ticketMedioPeriodo)+'</div></div>'+
      '<div class="funirow"><div class="lbl">Leads perdidos</div><div></div><div class="val">'+perdidosQtd+'</div></div>'+
      '<div class="funirow"><div class="lbl">Leads em aberto (gerados no período)</div><div></div><div class="val">'+abertoQtd+'</div></div>'+
      '<p class="empty" style="padding:6px 0;text-align:left;">Dados do funil Kommo atualizados em '+K.atualizado_em+'. Todos os números acima refletem apenas o período selecionado no filtro.</p>'+
    '</div>'+
    '<div class="card"><h2>Principais motivos de perda no período</h2>'+motivosHtml+'</div>'+
    '<div class="insight"><b>Insights para melhorar seus resultados</b>'+insights.map(function(s){ return '<div class="item">• '+s+'</div>'; }).join('')+'</div>';
}

      '<h2>Relatório — faturamento de clientes novos que formam o bônus do período corrente, já auditado ('+rowsFat.length+' notas)</h2>'+
      '<div class="scroll"><table class="sortable">'+
        '<thead><tr><th>Cliente</th><th>NF</th><th class="num">Mercadoria</th><th class="num">Frete</th><th class="num">Base do bônus</th></tr></thead>'+
        '<tbody>'+(rowsFat.length ? rowsFat.map(function(r){
          return '<tr><td>'+(r.cliente||'')+'</td><td>'+(r.nf||'')+'</td>'+
          '<td class="num">'+brl(r.merc)+'</td><td class="num">'+brl(r.frete)+'</td><td class="num">'+brl(r.base_bonus)+'</td></tr>';
        }).join('') : '<tr><td colspan="5" class="empty">Sem lançamentos (histórico não possui detalhamento linha a linha)</td></tr>')+'</tbody>'+
      '</table></div>'+
    '</div>';

  document.querySelectorAll('.sela').forEach(function(inp){
    inp.addEventListener('input', function(e){
      selaQty[e.target.dataset.key] = parseInt(e.target.value||0,10);
      render();
    });
  });
}

render();
renderKommo();
renderReativacao();

}catch(err){
  const b = document.getElementById('errorBanner');
  b.style.display='block';
  b.textContent = 'Erro ao carregar o painel: ' + (err && err.message ? err.message : err) + (err && err.stack ? ('\n'+err.stack) : '');
  console.error(err);
}
</script>

<script>
(function(){
  var MES_NOMES_REV = {'janeiro':1,'fevereiro':2,'março':3,'marco':3,'abril':4,'maio':5,'junho':6,
    'julho':7,'agosto':8,'setembro':9,'outubro':10,'novembro':11,'dezembro':12};

  function parseSortValue(raw){
    var text = (raw||'').trim();
    if(!text) return '';
    var m = text.match(/^(\d{2})\/(\d{2})\/(\d{4})/);
    if(m){ return new Date(parseInt(m[3],10), parseInt(m[2],10)-1, parseInt(m[1],10)).getTime(); }
    m = text.match(/^([A-Za-zçÇ]+)\/(\d{4})/);
    if(m){
      var mes = MES_NOMES_REV[m[1].toLowerCase()];
      if(mes){ return new Date(parseInt(m[2],10), mes-1, 1).getTime(); }
    }
    m = text.match(/^R\$\s*(-?[\d.]+,\d{2})/);
    if(m){ return parseFloat(m[1].replace(/\./g,'').replace(',','.')); }
    m = text.match(/^(-?\d+(?:[.,]\d+)?)/);
    if(m){ return parseFloat(m[1].replace(',','.')); }
    return text.toLowerCase();
  }

  document.addEventListener('click', function(e){
    var th = e.target.closest ? e.target.closest('table.sortable th') : null;
    if(!th) return;
    var table = th.closest('table');
    var tbody = table.querySelector('tbody');
    if(!tbody) return;
    var headerRow = th.parentElement;
    var ths = Array.prototype.slice.call(headerRow.children);
    var colIndex = ths.indexOf(th);
    var newDir = th.getAttribute('data-dir') === 'asc' ? 'desc' : 'asc';
    ths.forEach(function(h){
      h.removeAttribute('data-dir');
      var old = h.querySelector('.sort-arrow');
      if(old) old.remove();
    });
    th.setAttribute('data-dir', newDir);
    var arrow = document.createElement('span');
    arrow.className = 'sort-arrow';
    arrow.textContent = newDir === 'asc' ? '▲' : '▼';
    th.appendChild(arrow);

    var rows = Array.prototype.slice.call(tbody.querySelectorAll('tr'));
    rows.sort(function(r1, r2){
      var c1 = r1.children[colIndex], c2 = r2.children[colIndex];
      var v1 = parseSortValue(c1 ? c1.textContent : '');
      var v2 = parseSortValue(c2 ? c2.textContent : '');
      var cmp;
      if(typeof v1 === 'number' && typeof v2 === 'number'){ cmp = v1 - v2; }
      else { cmp = String(v1).localeCompare(String(v2), 'pt-BR'); }
      return newDir === 'asc' ? cmp : -cmp;
    });
    rows.forEach(function(r){ tbody.appendChild(r); });
  });
})();
</script>
